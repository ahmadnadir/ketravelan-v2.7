<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Redirecting…</title>
    <script>
      // SPA fallback for static hosting: redirect unknown routes back to the app
      // while preserving the original path for the client router.
      (function () {
        try {
          var original = window.location.pathname + window.location.search + window.location.hash;
          var url = window.location.origin + "/?redirect=" + encodeURIComponent(original);
          window.location.replace(url);
        } catch (e) {
          window.location.replace("/");
        }
      })();
    </script>
  </head>
  <body>
    Redirecting…
  </body>
</html>
